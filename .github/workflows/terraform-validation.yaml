name: Terraform Validation

on:
  push:
    paths:
      - '**.tf'
      - '**.lock.hcl'
      - '.github/workflows/terraform-validation.yaml'
    branches:
      - main
  pull_request:
    paths:
      - '**.tf'
      - '**.lock.hcl'
      - '.github/workflows/terraform-validation.yaml'

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - run: echo "$GITHUB_ACTOR"
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: 'false'
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Terraform Format
        run: terraform fmt -recursive -check ./
      - uses: terraform-linters/setup-tflint@6e1e0642c0289bd619021bf6b34e3c08ed1e005a # v6.3.0
      - name: Init tflint
        run: tflint --init
        working-directory: terraform
      - name: Run tflint
        run: tflint -f compact
        working-directory: terraform
      - name: Init tflint
        run: tflint --init
        working-directory: reposilite-server-terraform
      - name: Run tflint
        run: tflint -f compact
        working-directory: reposilite-server-terraform

  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: (github.event_name == 'push' || (github.event_name == 'pull_request' && contains(fromJSON('["Kotori316", "renovate[bot]"]'), github.actor)))
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_wrapper: 'false'
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{secrets.GCP_TERRAFORM_PLANNER_PROVIDER}}
          service_account: ${{secrets.GCP_TERRAFORM_PLANNER_SERVICE_ACCOUNT}}
      - name: Prepare log
        id: log
        run: |
          log_name="$(date "+%Y%m%d-%H%M%S")-terraform.log"
          echo "$GITHUB_ACTOR" >> "/tmp/${log_name}"
          echo "name=${log_name}" >> "$GITHUB_OUTPUT"
          echo "repo=$(basename "$GITHUB_REPOSITORY")" >> "$GITHUB_OUTPUT"
      - name: Init main config
        run: terraform init
        working-directory: terraform
      - name: Validate(main)
        run: terraform validate
        working-directory: terraform
      - name: Check plan(main)
        run: |
          echo "Cloudflare pages terraform" >>"/tmp/${{steps.log.outputs.name}}"
          if terraform plan -detailed-exitcode -lock=false -no-color >>"/tmp/${{steps.log.outputs.name}}" 2>&1; then echo "No changes"; else echo "Plan detected changes"; false; fi
        working-directory: terraform
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Init reposilite config
        run: terraform init
        working-directory: reposilite-server-terraform
      - name: Validate(reposilite)
        run: terraform validate
        working-directory: reposilite-server-terraform
      - name: Check plan(reposilite)
        run: |
          echo "Reposilite terraform" >>"/tmp/${{steps.log.outputs.name}}"
          if terraform plan -detailed-exitcode -lock=false -no-color >>"/tmp/${{steps.log.outputs.name}}" 2>&1; then echo "No changes"; else echo "Plan detected changes"; false; fi
        working-directory: reposilite-server-terraform
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Upload log
        if: ${{ !cancelled() }}
        uses: google-github-actions/upload-cloud-storage@6397bd7208e18d13ba2619ee21b9873edc94427a # v3.0.0
        with:
          path: /tmp/${{steps.log.outputs.name}}
          destination: kotori316-logs/${{steps.log.outputs.repo}}
          process_gcloudignore: false
