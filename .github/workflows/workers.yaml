name: Workers validation
on:
  push:
    paths:
      - 'workers/**'
      - 'file-metadata/**'
      - 'file-types/**'
      - '.github/workflows/workers.yaml'
    branches:
      - main
  pull_request:
    paths:
      - 'workers/**'
      - 'file-metadata/**'
      - 'file-types/**'
      - '.github/workflows/workers.yaml'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: flatt-security/setup-takumi-guard-npm@9a5d797c2085b6326d3a2985c08e3a114b9b88c1 # v1.1.1
      - run: echo './file-types' './workers' './file-metadata' | xargs -n1 cp ./.npmrc
      - run: docker compose run --rm -w /root/file-types node npm ci
      - run: docker compose run --rm -w /root/file-types node npm run ci
      - run: docker compose run --rm -w /root/file-types node npm run test
      - run: docker compose run --rm -w /root/workers node npm ci
      - run: docker compose run --rm -w /root/workers node npm run ci
      - run: docker compose run --rm -w /root/workers node npm run test
      - run: docker compose run --rm -w /root/file-metadata node npm ci
      - run: docker compose run --rm -w /root/file-metadata node npm run ci
      - run: docker compose run --rm -w /root/file-metadata node npm run test

  scan-pr:
    if: ${{ github.event_name == 'pull_request' }}
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable-pr.yml@9a498708959aeaef5ef730655706c5a1df1edbc2" # v2.3.8
    permissions:
      contents: read
      actions: read
      security-events: write

  publish-worker:
    if: ${{ github.event_name == 'push' }}
    needs:
      - test
    permissions:
      id-token: write
      contents: read
    uses: './.github/workflows/deploy-workers.yaml'
    with:
      branch: ${{ github.event_name == 'push' && 'main' || github.head_ref || 'preview' }}
    secrets: inherit

  update-content:
    if: ${{ github.event_name == 'push' }}
    needs:
      - test
    permissions:
      id-token: write
      contents: read
    uses: './.github/workflows/update-content.yaml'
    secrets: inherit
