name: Update content
on:
  workflow_call:
  workflow_dispatch:
  schedule:
    - cron: "20 19 * * *" # 04:20 in JST

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      id-token: write
      contents: read
    concurrency:
      group: main-update
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: 'file-metadata/package.json'
      - name: Check version
        run: |
          set -x
          node --version
          npm --version
          aws --version
      - run: npm ci
        working-directory: file-metadata
      - uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          workload_identity_provider: ${{secrets.GCP_IDENTITY_PROVIDER}}
          service_account: ${{secrets.GCP_SERVICE_ACCOUNT}}
      - name: Get credentials
        id: get-secrets
        uses: google-github-actions/get-secretmanager-secrets@bc9c54b29fdffb8a47776820a7d26e77b379d262 # v3.0.0
        with:
          secrets: |-
            cloudflare_access_key:kotori316-mods-resources/cloudflare_access_key
            cloudflare_s3_endpoint:kotori316-mods-resources/cloudflare_s3_endpoint
            cloudflare_secret_key:kotori316-mods-resources/cloudflare_secret_key
      - name: Create empty env file
        run: touch .env
        working-directory: file-metadata
      - name: Fetch maven storage
        env:
          AWS_ENDPOINT_URL: ${{steps.get-secrets.outputs.cloudflare_s3_endpoint}}
          AWS_ACCESS_KEY_ID: ${{steps.get-secrets.outputs.cloudflare_access_key}}
          AWS_SECRET_ACCESS_KEY: ${{steps.get-secrets.outputs.cloudflare_secret_key}}
          AWS_REGION: 'auto'
          AWS_REQUEST_CHECKSUM_CALCULATION: 'WHEN_REQUIRED'
          AWS_RESPONSE_CHECKSUM_VALIDATION: 'WHEN_REQUIRED'
          S3_BUCKET_NAME: 'kotori316-maven-r2'
          PUBLIC_DOMAIN: 'https://maven.kotori316.com'
        run: npm run dev
        working-directory: file-metadata
      - name: Upload to r2
        env:
          AWS_ENDPOINT_URL: ${{steps.get-secrets.outputs.cloudflare_s3_endpoint}}
          AWS_ACCESS_KEY_ID: ${{steps.get-secrets.outputs.cloudflare_access_key}}
          AWS_SECRET_ACCESS_KEY: ${{steps.get-secrets.outputs.cloudflare_secret_key}}
          AWS_REGION: 'auto'
          AWS_REQUEST_CHECKSUM_CALCULATION: 'WHEN_REQUIRED'
          AWS_RESPONSE_CHECKSUM_VALIDATION: 'WHEN_REQUIRED'
        run: >-
          aws s3 sync ./output s3://kotori316-maven-worker-material
        working-directory: file-metadata
