# https://google.github.io/osv-scanner/github-action
name: OSV Scanner
on:
  push:
    branches:
      - main
  schedule:
    - cron: '47 3 * * 2'

permissions:
  contents: read
  actions: read
  security-events: write

jobs:
  scan:
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@9a498708959aeaef5ef730655706c5a1df1edbc2" # v2.3.8
